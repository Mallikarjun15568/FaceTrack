<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kiosk{% endblock %}</title>

    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk_smooth.css') }}">
        <!-- Icons: prefer local copy (if available), otherwise use CDN -->
        {% if FA_LOCAL_AVAILABLE %}
        <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}">
        {% else %}
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        {% endif %}

    {% block head %}{% endblock %}
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e6e9f5 100%);
        }
    </style>
</head>

<body class="h-screen overflow-hidden">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
